<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/icon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JarNotes - PDF Summarizer</title>

  <style>
/* ---------------- FONT ---------------- */
@font-face{
  font-family: 'Bangers';
  src: url('assets/Bangers-Regular.ttf') format('truetype');
}

body {
  font-family: 'Bangers', Arial, sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  background-image: url('assets/Landing_Page.png');
  background-size: cover;
  background-position: center;
}

/* ---------------- HEADER ---------------- */
header {
  text-align: center;
  padding: 20px;
  color: white;
}

header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}

.highlight {
  color: #f8bc94; 
}

/* ---------------- POLAROID GALLERY ---------------- */
.polaroid-gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  margin: 20px 0;
}

.polaroid {
  background: white;
  padding: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transform: rotate(-2deg);
  border-radius: 8px;
  max-width: 200px;
  transition: 0.3s ease;
}

.polaroid:hover {
  transform: rotate(0deg) scale(1.05);
}

.polaroid img {
  width: 100%;
  border-radius: 6px;
}

/* ---------------- UPLOAD SECTION ---------------- */
.upload-section {
  position: relative;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 30px;
  margin: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(106, 13, 173, 0.4);
  text-align: center;
  width: 90%;
  max-width: 550px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  transition: 0.3s ease;
}

.upload-section:hover {
  transform: translateY(-5px);
}

/* Glow effect */
.upload-section::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(45deg, #8a2be2, #b266ff, #d8b4fe);
  z-index: -1;
  filter: blur(25px);
  opacity: 0.4;
}

/* ---------------- FILE UPLOAD ---------------- */
.file-upload-wrapper {
  margin-bottom: 20px;
}

.file-upload-label {
  display: inline-block;
  padding: 12px 28px;
  background: linear-gradient(135deg, #8a2be2, #b266ff);
  color: white;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s ease;
  box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
}

.file-upload-label:hover {
  transform: scale(1.07);
}

input[type="file"] {
  display: none;
}

.file-name {
  margin-top: 10px;
  font-size: 14px;
  color: white;
}

/* ---------------- CONTROLS ---------------- */
.control-group {
  margin: 15px 0;
}

select, #keyword {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  font-size: 15px;
  margin: 5px;
  outline: none;
}

/* ---------------- BUTTON ---------------- */
.upload-btn {
  background: linear-gradient(135deg, #6a0dad, #b266ff);
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 10px;
  transition: 0.3s ease;
  box-shadow: 0 8px 25px rgba(106, 13, 173, 0.6);
}

.upload-btn:hover {
  transform: scale(1.08);
}

/* ---------------- LOADING SPINNER ---------------- */
.loading {
  display: none;
  margin-top: 20px;
}

.spinner {
  border: 5px solid rgba(255,255,255,0.3);
  border-top: 5px solid #8a2be2;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ---------------- PDF PREVIEW ---------------- */
iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
  margin-top: 20px;
}

/* ---------------- SUMMARY ---------------- */
.summary {
  font-family: Georgia, serif;
  font-size: 1.1rem;
  line-height: 1.6;
  color: #2e2e2e;
  background: #faf8ff;
  border-left: 6px solid #8a2be2;
  padding: 20px;
  margin: 20px;
  border-radius: 12px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
  max-width: 800px;
  display: none;
}
  </style>
</head>

<body>

<header>
  <h1>Sit back and relax..</h1>
  <p>Let <span class="highlight">JarNotes</span> do the magic.</p>
  <p>Upload your PDFs and get instant summaries, notes, and explanations.</p>
</header>

<div class="polaroid-gallery">
  <div class="polaroid"><img src="assets/books.jpeg"></div>
  <div class="polaroid"><img src="assets/brain.jpeg"></div>
  <div class="polaroid"><img src="assets/notes.jpeg"></div>
  <div class="polaroid"><img src="assets/typewriter.jpeg"></div>
</div>

<div class="upload-section">

  <div class="file-upload-wrapper">
    <label for="pdfFile" class="file-upload-label">Choose Your PDF</label>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="control-group">
    <select id="task">
      <option value="1">📝 Summarizer</option>
      <option value="2">💡 Explanation</option>
      <option value="3">📚 Notemaker</option>
    </select>

    <input type="text" id="keyword" placeholder="Enter keyword..." style="display:none;">
  </div>

  <button class="upload-btn" onclick="uploadPDF()">Upload & Process</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:white;">Processing your PDF...</p>
  </div>

  <div id="pdfPreview"></div>
</div>

<div class="summary" id="summary"></div>

<script>
const taskSelect = document.getElementById("task");
const keywordInput = document.getElementById("keyword");
const fileInput = document.getElementById("pdfFile");
const fileNameDisplay = document.getElementById("fileName");
const loading = document.getElementById("loading");

taskSelect.addEventListener("change", () => {
  keywordInput.style.display = taskSelect.value === "2" ? "inline-block" : "none";
});

fileInput.addEventListener("change", function() {
  fileNameDisplay.textContent = this.files[0]?.name || "";
});

function uploadPDF() {
  if (!fileInput.files.length) {
    alert("Please select a PDF file.");
    return;
  }

  const file = fileInput.files[0];
  const formData = new FormData();
  formData.append("pdf", file);
  formData.append("task", taskSelect.value);
  formData.append("keyword", keywordInput.value);

  const pdfPreview = document.getElementById("pdfPreview");
  const summaryBox = document.getElementById("summary");

  const fileURL = URL.createObjectURL(file);
  pdfPreview.innerHTML = `<iframe src="${fileURL}"></iframe>`;

  loading.style.display = "block";

  fetch("https://jarnotes-2.onrender.com/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    loading.style.display = "none";
    summaryBox.style.display = "block";
    summaryBox.innerHTML = `<h3>From JarNotes:</h3><pre>${data.result_from_jarvis}</pre>`;
  })
  .catch(err => {
    loading.style.display = "none";
    summaryBox.style.display = "block";
    summaryBox.innerHTML = `<p style="color:red;">Error fetching summary.</p>`;
  });
}
</script>

</body>
</html>
